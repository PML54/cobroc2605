<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobroc — Nouvelle visite</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --card: #ffffff;
    --primary: #b5651d;
    --primary-dark: #8b4513;
    --text: #2d2520;
    --muted: #888;
    --border: #d9d0c4;
    --focus: #b5651d;
    --danger: #c0392b;
    --success: #27ae60;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 18px;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Visiteur toggle */
  .toggle-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .toggle-btn {
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }

  .toggle-btn.active {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }

  /* Form elements */
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
    margin-top: 14px;
  }

  label:first-of-type { margin-top: 0; }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--focus);
    background: white;
  }

  textarea {
    resize: vertical;
    min-height: 90px;
  }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .row3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  /* Autocomplete */
  .autocomplete-wrap {
    position: relative;
  }

  .dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    z-index: 100;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }

  .dropdown.open { display: block; }

  .dropdown-item {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 0.95rem;
  }

  .dropdown-item:hover, .dropdown-item.focused {
    background: #f5f0ea;
  }

  .dropdown-item .di-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }

  .dropdown-item .di-ville { font-weight: 600; }

  .dropdown-item .di-addr {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .dropdown-item .cp {
    font-size: 0.78rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .dropdown-item .visits {
    font-size: 0.72rem;
    color: #bbb;
    flex-shrink: 0;
  }

  .new-city-row {
    padding: 10px 14px;
    color: var(--primary);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .new-city-row:hover { background: #fdf5ee; }

  /* Stars */
  .stars {
    display: flex;
    gap: 6px;
    margin-top: 2px;
  }

  .star {
    font-size: 2rem;
    cursor: pointer;
    color: #ddd;
    transition: color 0.1s, transform 0.1s;
    user-select: none;
    line-height: 1;
  }

  .star.on { color: #e8a020; }
  .star:hover { transform: scale(1.15); }

  .star-zero {
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-left: 6px;
    align-self: center;
  }
  .star-zero:hover { background: #f5f0ea; }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 6px;
  }

  .submit-btn:hover { background: var(--primary-dark); }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* Feedback banner */
  #feedback {
    display: none;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    margin-bottom: 14px;
    font-weight: 600;
  }

  #feedback.success {
    background: #eafaf1;
    color: var(--success);
    border: 1px solid #a9dfbf;
    display: block;
  }

  #feedback.error {
    background: #fdedec;
    color: var(--danger);
    border: 1px solid #f5b7b1;
    display: block;
  }

  .agent-note {
    margin-top: 8px;
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 400;
  }

  /* Details toggle */
  details summary {
    font-size: 0.82rem;
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    margin-top: 14px;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  details summary::before {
    content: "▶";
    font-size: 0.65rem;
    transition: transform 0.15s;
  }

  details[open] summary::before { transform: rotate(90deg); }
  details summary::-webkit-details-marker { display: none; }

  /* Détail des achats : description + prix distincts */
  #achats-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }

  .achat-row {
    display: grid;
    grid-template-columns: 1fr 90px 34px;
    gap: 8px;
    align-items: center;
  }

  .achat-prix-wrap { position: relative; }
  .achat-prix-wrap::after {
    content: "€";
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
  }
  .achat-prix { padding-right: 22px !important; }

  .achat-del {
    width: 34px; height: 38px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--danger);
    font-size: 1rem;
    cursor: pointer;
    line-height: 1;
  }
  .achat-del:hover { background: #fdedec; }

  .add-achat {
    margin-top: 10px;
    padding: 8px 12px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--primary);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
  }
  .add-achat:hover { background: #fdf5ee; }

  /* Champs lecture seule (couple sélectionné) */
  input.ro {
    background: #efe9e1;
    color: var(--text);
    cursor: default;
  }
  input.ro:focus { border-color: var(--border); background: #efe9e1; }

  /* Modale Nouveau lieu */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
    z-index: 1000;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }

  .modal-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }

  .btn {
    padding: 14px;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
  }
  .btn-primary {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }
  .btn-primary:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }

  #nl_error {
    display: none;
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    background: #fdedec;
    color: var(--danger);
    border: 1px solid #f5b7b1;
    font-size: 0.88rem;
    font-weight: 600;
  }
  #nl_error.show { display: block; }
</style>
</head>
<body>

<h1>🛍 Cobroc — Nouvelle visite</h1>

<div id="feedback"></div>

<form id="mainForm" autocomplete="off" novalidate>

  <!-- Visiteur -->
  <div class="card">
    <div class="section-title">Visiteur</div>
    <div class="toggle-group">
      <button type="button" class="toggle-btn" id="btn-pml" onclick="setName('PML')">PML</button>
      <button type="button" class="toggle-btn" id="btn-fra" onclick="setName('FRA')">FRA</button>
    </div>
  </div>

  <!-- Date + Note -->
  <div class="card">
    <div class="section-title">Visite</div>
    <div class="row2">
      <div>
        <label for="hist_date">Date</label>
        <input type="date" id="hist_date" required>
      </div>
      <div>
        <label>Note</label>
        <div class="stars" id="stars">
          <span class="star" data-v="1">★</span>
          <span class="star" data-v="2">★</span>
          <span class="star" data-v="3">★</span>
          <span class="star" data-v="4">★</span>
          <span class="star" data-v="5">★</span>
          <span class="star-zero" id="star-zero" title="Remettre à 0">✕</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Lieu -->
  <div class="card">
    <div class="section-title">Lieu</div>

    <label for="loc_q">Ville</label>
    <div class="autocomplete-wrap">
      <input type="text" id="loc_q" name="loc_q" placeholder="Chercher un lieu existant…"
             autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
             data-1p-ignore data-lpignore="true"
             readonly onfocus="this.removeAttribute('readonly')">
      <div class="dropdown" id="dropdown"></div>
    </div>

    <div class="row2">
      <div>
        <label for="fpc">Code postal</label>
        <input type="number" id="fpc" name="fpc" class="ro" placeholder="—" readonly tabindex="-1">
      </div>
      <div>
        <label for="hist_nb_expo">Nb exposants</label>
        <input type="number" id="hist_nb_expo" placeholder="0" min="0">
      </div>
    </div>

    <label for="floc">Adresse / lieu précis</label>
    <input type="text" id="floc" name="floc" class="ro" placeholder="—" readonly tabindex="-1">
  </div>

  <!-- Dépenses -->
  <div class="card">
    <div class="section-title">Dépenses (€)</div>
    <div class="row3">
      <div>
        <label for="hist_pml_dep">PML</label>
        <input type="number" id="hist_pml_dep" placeholder="0" min="0">
      </div>
      <div>
        <label for="hist_fra_dep">FRA</label>
        <input type="number" id="hist_fra_dep" placeholder="0" min="0">
      </div>
      <div>
        <label for="hist_maison_dep">Maison</label>
        <input type="number" id="hist_maison_dep" placeholder="0" min="0">
      </div>
    </div>
  </div>

  <!-- Avis -->
  <div class="card">
    <div class="section-title">Avis</div>
    <textarea id="hist_avis" placeholder="Notes de visite, conseils, observations…"></textarea>

    <details>
      <summary>Détail des achats</summary>
      <div id="achats-list"></div>
      <button type="button" class="add-achat" id="addAchat">＋ Ajouter un objet</button>
    </details>
  </div>

  <button type="submit" class="submit-btn" id="submitBtn">Enregistrer</button>

</form>

<!-- Modale : Nouveau lieu -->
<div class="modal-overlay" id="lieuModal">
  <div class="modal">
    <div class="modal-title">📍 Nouveau lieu</div>

    <label for="nlv">Ville</label>
    <input type="text" id="nlv" name="nlv" autocomplete="off" autocapitalize="characters" spellcheck="false"
           data-1p-ignore data-lpignore="true" readonly onfocus="this.removeAttribute('readonly')">

    <label for="nlp">Code postal</label>
    <input type="number" id="nlp" name="nlp" placeholder="95000" autocomplete="off"
           data-1p-ignore data-lpignore="true" readonly onfocus="this.removeAttribute('readonly')">

    <label for="nll">Adresse / lieu précis</label>
    <input type="text" id="nll" name="nll" placeholder="Parking, stade, centre-ville…"
           autocomplete="off" spellcheck="false" data-1p-ignore data-lpignore="true"
           readonly onfocus="this.removeAttribute('readonly')">

    <label for="nln">Nom (optionnel)</label>
    <input type="text" id="nln" name="nln" placeholder="Brocante de…, Vide-grenier…" autocomplete="off"
           data-1p-ignore data-lpignore="true" readonly onfocus="this.removeAttribute('readonly')">

    <label for="nlr">Récurrence (optionnel)</label>
    <input type="text" id="nlr" name="nlr" placeholder="mensuel, annuel, ponctuel…" autocomplete="off"
           data-1p-ignore data-lpignore="true" readonly onfocus="this.removeAttribute('readonly')">

    <div id="nl_error"></div>

    <div class="modal-actions">
      <button type="button" class="btn" id="nl_cancel">Annuler</button>
      <button type="button" class="btn btn-primary" id="nl_create">Créer</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let selectedName = null;   // 'PML' | 'FRA'
let selectedGood = 0;
let selectedLieuId = null; // id du lieu sélectionné dans le dropdown, null si nouveau
let debounceTimer = null;
let dropFocused = -1;
let dropItems = [];

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('hist_date').value = today();

function today() {
  return new Date().toISOString().slice(0, 10);
}

// ── Visiteur ───────────────────────────────────────────────────────────────
function setName(n) {
  selectedName = n;
  document.getElementById('btn-pml').classList.toggle('active', n === 'PML');
  document.getElementById('btn-fra').classList.toggle('active', n === 'FRA');
}

// ── Stars ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.star').forEach(s => {
  s.addEventListener('click', () => {
    selectedGood = +s.dataset.v;
    renderStars();
  });
  s.addEventListener('mouseover', () => highlightStars(+s.dataset.v));
  s.addEventListener('mouseout', () => renderStars());
});
document.getElementById('star-zero').addEventListener('click', () => {
  selectedGood = 0; renderStars();
});

function renderStars() {
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('on', +s.dataset.v <= selectedGood);
  });
}

function highlightStars(v) {
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('on', +s.dataset.v <= v);
  });
}

// ── Autocomplete ville ─────────────────────────────────────────────────────
const villeInput = document.getElementById('loc_q');
const dropdown   = document.getElementById('dropdown');

villeInput.addEventListener('input', () => {
  villeInput.value = villeInput.value.toUpperCase();   // force majuscules
  selectedLieuId = null;
  document.getElementById('fpc').value = '';
  document.getElementById('floc').value = '';
  clearTimeout(debounceTimer);
  const q = villeInput.value.trim();
  if (q.length < 1) { closeDropdown(); return; }       // dès la 1re lettre
  debounceTimer = setTimeout(() => fetchVilles(q), 250);
});

villeInput.addEventListener('keydown', e => {
  if (!dropdown.classList.contains('open')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); moveFocus(-1); }
  else if (e.key === 'Enter') { e.preventDefault(); if (dropFocused >= 0) selectDropItem(dropFocused); }
  else if (e.key === 'Escape') closeDropdown();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) closeDropdown();
});

async function fetchVilles(q) {
  try {
    const res = await fetch(`/lieux?ville=${encodeURIComponent(q)}&sort=visites_desc&limit=8`);
    const data = await res.json();
    renderDropdown(data, q);
  } catch { closeDropdown(); }
}

function renderDropdown(items, q) {
  dropItems = items;
  dropFocused = -1;
  dropdown.innerHTML = '';

  items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'dropdown-item';
    const titre = item.nom ? `${escapeHtml(item.nom)} — ${item.ville}` : item.ville;
    const addr  = item.adresse ? escapeHtml(item.adresse) : '—';
    div.innerHTML = `
      <div class="di-top">
        <span class="di-ville">${highlight(titre, q)}</span>
        <span class="cp">${item.code_postal || ''}</span>
      </div>
      <div class="di-addr">
        <span>${addr}</span>
        <span class="visits">${item.nb_visites} visite${item.nb_visites > 1 ? 's' : ''}</span>
      </div>
    `;
    div.addEventListener('click', () => selectDropItem(i));
    dropdown.appendChild(div);
  });

  const newRow = document.createElement('div');
  newRow.className = 'new-city-row';
  newRow.innerHTML = `<span>＋</span> Nouveau lieu « <strong>${q.toUpperCase()}</strong> »`;
  newRow.addEventListener('click', () => openLieuModal(q));
  dropdown.appendChild(newRow);

  dropdown.classList.add('open');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function highlight(text, q) {
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.slice(0, idx) + '<strong>' + text.slice(idx, idx + q.length) + '</strong>' + text.slice(idx + q.length);
}

// Applique un lieu sélectionné (depuis la liste OU après création dans la modale)
function applyLieu(lieu) {
  selectedLieuId = lieu.id;
  villeInput.value = lieu.ville;
  document.getElementById('fpc').value  = lieu.code_postal || '';
  document.getElementById('floc').value = lieu.adresse || '';
}

function selectDropItem(i) {
  const item = dropItems[i];
  if (!item) return;
  applyLieu(item);
  closeDropdown();
}

function moveFocus(dir) {
  const items = dropdown.querySelectorAll('.dropdown-item');
  items.forEach((el, i) => el.classList.toggle('focused', i === dropFocused));
  dropFocused = Math.max(-1, Math.min(dropItems.length - 1, dropFocused + dir));
  items.forEach((el, i) => el.classList.toggle('focused', i === dropFocused));
}

function closeDropdown() {
  dropdown.classList.remove('open');
  dropFocused = -1;
}

// ── Modale : Nouveau lieu ────────────────────────────────────────────────────
const lieuModal = document.getElementById('lieuModal');

function openLieuModal(prefillVille) {
  closeDropdown();
  document.getElementById('nlv').value      = (prefillVille || '').trim().toUpperCase();
  document.getElementById('nlp').value         = '';
  document.getElementById('nll').value    = '';
  document.getElementById('nln').value        = '';
  document.getElementById('nlr').value = '';
  hideLieuError();
  lieuModal.classList.add('open');
  document.getElementById('nlp').focus();
}

function closeLieuModal() {
  lieuModal.classList.remove('open');
}

function showLieuError(msg) {
  const el = document.getElementById('nl_error');
  el.textContent = msg;
  el.classList.add('show');
}

function hideLieuError() {
  document.getElementById('nl_error').classList.remove('show');
}

document.getElementById('nl_cancel').addEventListener('click', closeLieuModal);
lieuModal.addEventListener('click', e => { if (e.target === lieuModal) closeLieuModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && lieuModal.classList.contains('open')) closeLieuModal();
});

document.getElementById('nl_create').addEventListener('click', createLieu);

async function createLieu() {
  const ville      = document.getElementById('nlv').value.trim().toUpperCase();
  const cp         = parseInt(document.getElementById('nlp').value) || 0;
  const adresse    = document.getElementById('nll').value.trim();
  const nom        = document.getElementById('nln').value.trim();
  const recurrence = document.getElementById('nlr').value.trim();

  if (!ville) { showLieuError('La ville est obligatoire.'); return; }
  if (!cp)    { showLieuError('Le code postal est obligatoire.'); return; }

  const btn = document.getElementById('nl_create');
  btn.disabled = true;
  btn.textContent = 'Création…';
  hideLieuError();

  try {
    const res = await fetch('/lieux', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nom, ville, code_postal: cp, adresse, recurrence }),
    });
    const data = await res.json();
    if (res.ok) {
      applyLieu(data);
      closeLieuModal();
      showFeedback('success', `✓ Lieu créé : ${data.ville}${data.adresse ? ' — ' + data.adresse : ''}`);
    } else {
      showLieuError(data.detail || 'Erreur lors de la création du lieu.');
    }
  } catch (err) {
    showLieuError('Erreur réseau : ' + err.message);
  }

  btn.disabled = false;
  btn.textContent = 'Créer';
}

// ── Détail des achats (description + prix distincts) ─────────────────────────
const achatsList = document.getElementById('achats-list');

function addAchatRow(desc = '', prix = '') {
  const row = document.createElement('div');
  row.className = 'achat-row';
  row.innerHTML = `
    <input type="text" class="achat-desc" placeholder="Objet acheté…" autocomplete="off"
           spellcheck="false" data-1p-ignore data-lpignore="true" value="${escapeHtml(desc)}">
    <div class="achat-prix-wrap">
      <input type="number" class="achat-prix" placeholder="0" min="0" step="1"
             inputmode="numeric" autocomplete="off" value="${escapeHtml(prix)}">
    </div>
    <button type="button" class="achat-del" title="Retirer cet objet">✕</button>
  `;
  row.querySelector('.achat-del').addEventListener('click', () => {
    row.remove();
    if (!achatsList.querySelector('.achat-row')) addAchatRow();   // garder au moins 1 ligne
  });
  achatsList.appendChild(row);
}

// Recompose la chaîne hist_detail au format existant : "desc=prix€+desc=prix€…"
function buildDetail() {
  const parts = [];
  achatsList.querySelectorAll('.achat-row').forEach(row => {
    const desc = row.querySelector('.achat-desc').value.trim();
    const prix = row.querySelector('.achat-prix').value.trim();
    if (!desc && !prix) return;
    parts.push(prix ? `${desc}=${prix}€` : desc);
  });
  return parts.join('+');
}

function resetAchats() {
  achatsList.innerHTML = '';
  addAchatRow();
}

document.getElementById('addAchat').addEventListener('click', () => addAchatRow());
addAchatRow();   // une ligne vide au départ

// ── Submit ─────────────────────────────────────────────────────────────────
document.getElementById('mainForm').addEventListener('submit', async e => {
  e.preventDefault();
  if (!validate()) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';

  const ville       = villeInput.value.trim().toUpperCase();
  const code_postal = parseInt(document.getElementById('fpc').value) || 0;
  const adresse     = document.getElementById('floc').value.trim();
  const lieu_id     = selectedLieuId;

  const body = {
    hist_name:        selectedName,
    hist_date:        document.getElementById('hist_date').value,
    hist_good:        selectedGood,
    hist_ville:       ville,
    hist_code_postal: code_postal,
    hist_adresse:     adresse,
    hist_nb_expo:     parseInt(document.getElementById('hist_nb_expo').value) || 0,
    hist_pml_dep:     parseInt(document.getElementById('hist_pml_dep').value) || 0,
    hist_fra_dep:     parseInt(document.getElementById('hist_fra_dep').value) || 0,
    hist_maison_dep:  parseInt(document.getElementById('hist_maison_dep').value) || 0,
    hist_avis:        document.getElementById('hist_avis').value.trim(),
    hist_detail:      buildDetail(),
    lieu_id,
  };

  try {
    const res = await fetch('/historic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const data = await res.json();

    if (res.ok) {
      showFeedback('success',
        `✓ Visite enregistrée — ${data.hist_ville} (${data.hist_date})` +
        (data.agent_notes ? `<div class="agent-note">Agent : ${data.agent_notes}</div>` : '')
      );
      resetForm();
    } else {
      const msg = data.detail || JSON.stringify(data);
      showFeedback('error', `Erreur : ${msg}`);
    }
  } catch (err) {
    showFeedback('error', `Erreur réseau : ${err.message}`);
  }

  btn.disabled = false;
  btn.textContent = 'Enregistrer';
});

function validate() {
  let ok = true;

  if (!selectedName) {
    showFeedback('error', 'Choisissez un visiteur (PML ou FRA).');
    return false;
  }

  if (!document.getElementById('hist_date').value) {
    showFeedback('error', 'La date est obligatoire.');
    return false;
  }

  if (!selectedLieuId) {
    showFeedback('error', 'Choisissez un lieu dans la liste, ou créez-en un avec « ＋ Nouveau lieu ».');
    villeInput.focus();
    return false;
  }

  return ok;
}

function showFeedback(type, html) {
  const el = document.getElementById('feedback');
  el.className = type;
  el.innerHTML = html;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetForm() {
  selectedName = null;
  selectedGood = 0;
  selectedLieuId = null;
  document.getElementById('btn-pml').classList.remove('active');
  document.getElementById('btn-fra').classList.remove('active');
  renderStars();
  document.getElementById('hist_date').value = today();
  villeInput.value = '';
  ['fpc','floc','hist_nb_expo',
   'hist_pml_dep','hist_fra_dep','hist_maison_dep',
   'hist_avis'].forEach(id => {
    document.getElementById(id).value = '';
  });
  resetAchats();
}
</script>
</body>
